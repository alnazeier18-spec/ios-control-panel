<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS Style Control Center</title>

<style>
body {
  margin: 0;
  font-family: sans-serif;
  background: #000;
  overflow: hidden;
}

/* الخلفية */
.backdrop {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.3);
  backdrop-filter: blur(0px);
  opacity: 0;
  transition: 0.25s;
}

/* اللوحة */
.panel {
  position: fixed;
  top: -75%;
  width: 100%;
  height: 75%;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(35px);
  border-bottom-left-radius: 35px;
  border-bottom-right-radius: 35px;
  padding: 15px;
  color: white;
  transition: 0.35s cubic-bezier(.25,.8,.25,1);
}

/* handle */
.handle {
  width: 60px;
  height: 5px;
  background: rgba(255,255,255,0.4);
  border-radius: 10px;
  margin: 10px auto;
}

/* grid */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-top: 20px;
}

/* large tiles */
.tile {
  background: rgba(255,255,255,0.12);
  border-radius: 25px;
  padding: 18px;
}

/* small tiles */
.small-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.btn {
  background: rgba(255,255,255,0.12);
  border-radius: 18px;
  padding: 18px 0;
  text-align: center;
  font-size: 20px;
}

/* sliders */
input[type=range] {
  width: 100%;
}
</style>
</head>

<body>

<div class="backdrop" id="backdrop"></div>

<div class="panel" id="panel">

  <div class="handle"></div>

  <h3 style="text-align:center;margin:5px;">Control Center</h3>

  <!-- الصف العلوي (WiFi + Bluetooth) -->
  <div class="small-grid">
    <div class="btn">📶<br>WiFi</div>
    <div class="btn">🔵<br>BT</div>
    <div class="btn">📡<br>Air</div>
    <div class="btn">🔒<br>Lock</div>
  </div>

  <!-- السطوع -->
  <div class="tile">
    🌞 Brightness
    <input type="range" min="1" max="100" value="50"
    oninput="document.body.style.filter='brightness('+this.value+'%)'">
  </div>

  <!-- الصوت -->
  <div class="tile">
    🔊 Volume
    <input type="range" min="0" max="100" value="50">
  </div>

  <!-- أزرار سفلية -->
  <div class="small-grid">
    <div class="btn">🔦</div>
    <div class="btn">🌙</div>
    <div class="btn">📷</div>
    <div class="btn">⚙️</div>
  </div>

</div>

<script>
let panel = document.getElementById("panel");
let backdrop = document.getElementById("backdrop");

let startY = 0;

document.addEventListener("touchstart", e => {
  startY = e.touches[0].clientY;

  if (startY < 70) {
    panel.style.top = "0";
    backdrop.style.opacity = "1";
  }
});

panel.addEventListener("touchmove", e => {
  let y = e.touches[0].clientY;

  if (y - startY > 80) {
    panel.style.top = "-75%";
    backdrop.style.opacity = "0";
  }
});

backdrop.addEventListener("click", () => {
  panel.style.top = "-75%";
  backdrop.style.opacity = "0";
});
</script>

</body>
</html>
